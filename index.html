<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Controle de Clientes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Sistema de Controle de Clientes</h1>
    <p class="subtitulo">Cadastro simples de clientes e calculo de imposto.</p>

    <form id="cliente-form" class="card">
      <label for="tipo">Tipo de cliente</label>
      <select id="tipo" name="tipo" required>
        <option value="">Selecione...</option>
        <option value="f">Pessoa Fisica</option>
        <option value="j">Pessoa Juridica</option>
      </select>

      <label for="nome">Nome</label>
      <input id="nome" name="nome" type="text" placeholder="Ex: Maria Silva" required>

      <label for="endereco">Endereco</label>
      <input id="endereco" name="endereco" type="text" placeholder="Ex: Rua A, 123" required>

      <div id="campos-dinamicos"></div>

      <label for="valorCompra">Valor da compra</label>
      <input id="valorCompra" name="valorCompra" type="number" min="0" step="0.01" placeholder="0,00" required>

      <button type="submit">Calcular</button>
    </form>

    <section id="resultado" class="hidden card"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
